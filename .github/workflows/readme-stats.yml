name: Generate GitHub Stats

on:
  schedule:
    # Roda a cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      # 1. Gerar as Top Languages usando a Action Oficial do Metrics
      - name: Generate top languages (Metrics)
        uses: lowlighter/metrics@latest
        with:
          # Define onde o arquivo final será salvo
          filename: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

          # Parâmetros extras para forçar a busca de dados:
          commits_authoring: MarcMunhoz, MarcMunhoz@users.noreply.github.com
          
          # Configurações para focar APENAS em linguagens (substituindo o github-readme-stats)
          base: "" # Desativa os blocos padrão (header, info, etc)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_indepth: yes # Força uma análise mais profunda dos commits
          plugin_languages_ignored: html, css # Opcional: ignora linguagens que não sejam de programação real
          
          # Estilização básica
          config_timezone: America/Sao_Paulo

      # 2. Streak Stats via curl
      - name: Generate main stats (Streak)
        run: |
          curl -L "https://streak-stats.demolab.com?user=${{ github.repository_owner }}&theme=vue-dark" \
          -o assets/github-stats.svg

      # 3. Commita as duas imagens geradas de volta para o repositório
      - name: Commit updated SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update GitHub stats"
          file_pattern: assets/*.svg
